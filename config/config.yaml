project:
  name: Customer Churn Prediction

data:
  test_size: 0.20
  random_state: 42

random_forest:
  n_estimators: 200
  max_depth: 10
  class_weight: null  # SMOTE already balances the training set — avoid double-correcting

xgboost:
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 6
  scale_pos_weight: 1  # SMOTE already balances the training set — don't double up

logistic_regression:
  max_iter: 1000
  class_weight: null  # SMOTE already balances the training set — avoid double-correcting

smote:
  enabled: true
  random_state: 42

shap:
  sample_size: 500

risk_thresholds:
  high: 0.70
  medium: 0.40